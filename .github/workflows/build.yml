name: Build Cemu (clang-tidy only)

on:
  workflow_dispatch:
    inputs:
      next_version_major:
        description: 'Next major version (optional)'
        required: false
        type: string
      next_version_minor:
        description: 'Next minor version (optional)'
        required: false
        type: string

jobs:
  build-macos:
    runs-on: macos-14
    strategy:
      matrix:
        arch: [x86_64, arm64]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup build parameters
      run: |
        echo "BUILD_MODE=release" >> $GITHUB_ENV
        echo "BUILD_FLAGS=" >> $GITHUB_ENV
        echo "Build mode is release"

    - name: Setup build flags for version
      if: ${{ github.event.inputs.next_version_major != '' }}
      run: |
        echo "[INFO] Version ${{ github.event.inputs.next_version_major }}.${{ github.event.inputs.next_version_minor }}"
        echo "BUILD_FLAGS=${{ env.BUILD_FLAGS }} -DEMULATOR_VERSION_MAJOR=${{ github.event.inputs.next_version_major }} -DEMULATOR_VERSION_MINOR=${{ github.event.inputs.next_version_minor }}" >> $GITHUB_ENV

    - name: Install system dependencies
      run: |
        brew update
        brew install ninja llvm

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.29.0'

    - name: Configure CMake with clang-tidy
      run: |
        mkdir build
        cd build
        cmake .. ${{ env.BUILD_FLAGS }} \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_MODE }} \
          -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DCMAKE_CXX_CLANG_TIDY="clang-tidy;-checks=*;-warnings-as-errors=*" \
          -G Ninja

    - name: Run clang-tidy manually
      run: |
        export PATH="/usr/local/opt/llvm/bin:$PATH"
        clang-tidy -p build $(find src -name "*.cpp" -or -name "*.mm") || true

    - name: Build Cemu
      run: cmake --build build
